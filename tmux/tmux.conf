set -g default-terminal "tmux-256color"
set -g prefix C-SPACE
set -g base-index 1
set -g renumber-windows on
set -g mode-keys vi
set -g status-position top
set -g status-justify absolute-centre
set -g status-style "bg=default"
set -g window-status-current-style "fg=blue bold"
set -g status-right "_"
set -g status-left "#S"

set -g mouse on

unbind r
bind r source-file ~/.config/tmux/tmux.conf\; display-message "Config reloaded"
bind g run-shell "~/.local/bin/open-github.sh"
bind H run-shell "~/.local/bin/tmux-sessionizer ~/Documents/projects/fista"
bind S run-shell "~/.local/bin/tmux-sessionizer ~/Documents/projects/IsKahoot"
unbind f
bind f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"


bind -n M-H previous-window
bind -n M-L next-window

bind -n M-h select-pane -L
bind -n M-Left select-pane -L

bind -n M-j select-pane -D
bind -n M-Down select-pane -D

bind -n M-k select-pane -U
bind -n M-Up select-pane -U

bind -n M-l select-pane -R
bind -n M-Right select-pane -R


bind | split-window -h
bind - split-window -v
unbind '"'
unbind '%'
